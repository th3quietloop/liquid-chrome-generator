<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid Chrome Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
canvas {
  display: block;
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  z-index: 0;
}
#panel {
  position: fixed;
  top: 24px;
  right: 24px;
  width: 300px;
  background: rgba(10, 10, 14, 0.75);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 16px;
  padding: 24px;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: rgba(255, 255, 255, 0.9);
  z-index: 10;
  user-select: none;
}
.panel-header { margin-bottom: 20px; }
.panel-header h1 {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.02em;
  margin-bottom: 4px;
}
.panel-header .subtitle {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: rgba(255, 255, 255, 0.35);
  font-weight: 500;
}
.control-group { margin-bottom: 16px; }
.control-group:last-child { margin-bottom: 0; }
.control-group label {
  display: block;
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: rgba(255, 255, 255, 0.5);
  margin-bottom: 8px;
}
.slider-row {
  display: flex;
  align-items: center;
  gap: 12px;
}
.value-display {
  font-size: 11px;
  font-variant-numeric: tabular-nums;
  min-width: 44px;
  text-align: right;
  color: rgba(255, 255, 255, 0.45);
  font-weight: 400;
}
input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  flex: 1;
  height: 3px;
  border-radius: 2px;
  background: rgba(255, 255, 255, 0.1);
  outline: none;
  cursor: pointer;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.85);
  border: none;
  box-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
  cursor: pointer;
  transition: transform 0.15s ease;
}
input[type="range"]::-webkit-slider-thumb:hover {
  transform: scale(1.15);
}
input[type="range"]::-moz-range-thumb {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.85);
  border: none;
  box-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
  cursor: pointer;
}
input[type="range"]::-moz-range-track {
  height: 3px;
  border-radius: 2px;
  background: rgba(255, 255, 255, 0.1);
  border: none;
}
.preset-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.preset {
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 8px;
  padding: 8px 0;
  color: rgba(255, 255, 255, 0.5);
  font-size: 11px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s ease;
}
.preset:hover {
  background: rgba(255, 255, 255, 0.1);
  color: rgba(255, 255, 255, 0.7);
}
.preset.active {
  background: rgba(255, 255, 255, 0.12);
  border-color: rgba(255, 255, 255, 0.2);
  color: rgba(255, 255, 255, 0.95);
}
#fallback {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 100;
  background: #0a0a0e;
  color: rgba(255,255,255,0.7);
  font-family: 'Inter', sans-serif;
  font-size: 16px;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 40px;
}
@media (max-width: 480px) {
  #panel {
    top: auto;
    bottom: 0;
    right: 0;
    left: 0;
    width: 100%;
    border-radius: 16px 16px 0 0;
    max-height: 55vh;
    overflow-y: auto;
    padding: 20px;
  }
}
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="fallback">WebGL 2 is required but not available in this browser.</div>

<div id="panel">
  <div class="panel-header">
    <h1>Liquid Chrome</h1>
    <p class="subtitle">Generative Metal Simulation</p>
  </div>
  <div class="panel-body">
    <div class="control-group">
      <label>Viscosity</label>
      <div class="slider-row">
        <input type="range" id="viscosity" min="0" max="100" value="50">
        <span class="value-display" id="viscosity-val">0.50</span>
      </div>
    </div>
    <div class="control-group">
      <label>Reflection Intensity</label>
      <div class="slider-row">
        <input type="range" id="reflection" min="15" max="100" value="50">
        <span class="value-display" id="reflection-val">1.00</span>
      </div>
    </div>
    <div class="control-group">
      <label>Flow Speed</label>
      <div class="slider-row">
        <input type="range" id="speed" min="3" max="100" value="27">
        <span class="value-display" id="speed-val">0.80</span>
      </div>
    </div>
    <div class="control-group">
      <label>Color Tint</label>
      <div class="slider-row">
        <input type="range" id="tint" min="0" max="100" value="0">
        <span class="value-display" id="tint-val">Silver</span>
      </div>
    </div>
    <div class="control-group">
      <label>Scene Presets</label>
      <div class="preset-row">
        <button class="preset active" data-preset="mercury">Mercury</button>
        <button class="preset" data-preset="gold">Molten Gold</button>
        <button class="preset" data-preset="steel">Dark Steel</button>
        <button class="preset" data-preset="neon">Neon Chrome</button>
      </div>
    </div>
  </div>
</div>

<script id="vertexShader" type="x-shader/x-vertex">#version 300 es
precision highp float;
out vec2 vUv;
void main() {
    float x = float((gl_VertexID & 1) << 2);
    float y = float((gl_VertexID & 2) << 1);
    vUv = vec2(x, y) * 0.5;
    gl_Position = vec4(x - 1.0, y - 1.0, 0.0, 1.0);
}
</script>

<script id="fragmentShader" type="x-shader/x-fragment">#version 300 es
precision highp float;

in vec2 vUv;
out vec4 fragColor;

uniform float u_time;
uniform vec2 u_resolution;
uniform float u_viscosity;
uniform float u_reflectionIntensity;
uniform float u_flowSpeed;
uniform float u_colorTint;

// --- 3D Simplex Noise (Ashima Arts / Stefan Gustavson, MIT license) ---
vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
vec4 permute(vec4 x) { return mod289(((x * 34.0) + 10.0) * x); }
vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }

float snoise(vec3 v) {
    const vec2 C = vec2(1.0 / 6.0, 1.0 / 3.0);
    const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
    vec3 i = floor(v + dot(v, C.yyy));
    vec3 x0 = v - i + dot(i, C.xxx);
    vec3 g = step(x0.yzx, x0.xyz);
    vec3 l = 1.0 - g;
    vec3 i1 = min(g.xyz, l.zxy);
    vec3 i2 = max(g.xyz, l.zxy);
    vec3 x1 = x0 - i1 + C.xxx;
    vec3 x2 = x0 - i2 + C.yyy;
    vec3 x3 = x0 - D.yyy;
    i = mod289(i);
    vec4 p = permute(permute(permute(
        i.z + vec4(0.0, i1.z, i2.z, 1.0))
      + i.y + vec4(0.0, i1.y, i2.y, 1.0))
      + i.x + vec4(0.0, i1.x, i2.x, 1.0));
    float n_ = 0.142857142857;
    vec3 ns = n_ * D.wyz - D.xzx;
    vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
    vec4 x_ = floor(j * ns.z);
    vec4 y_ = floor(j - 7.0 * x_);
    vec4 x = x_ * ns.x + ns.yyyy;
    vec4 y = y_ * ns.x + ns.yyyy;
    vec4 h = 1.0 - abs(x) - abs(y);
    vec4 b0 = vec4(x.xy, y.xy);
    vec4 b1 = vec4(x.zw, y.zw);
    vec4 s0 = floor(b0) * 2.0 + 1.0;
    vec4 s1 = floor(b1) * 2.0 + 1.0;
    vec4 sh = -step(h, vec4(0.0));
    vec4 a0 = b0.xzyw + s0.xzyw * sh.xxyy;
    vec4 a1 = b1.xzyw + s1.xzyw * sh.zzww;
    vec3 p0 = vec3(a0.xy, h.x);
    vec3 p1 = vec3(a0.zw, h.y);
    vec3 p2 = vec3(a1.xy, h.z);
    vec3 p3 = vec3(a1.zw, h.w);
    vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
    p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
    vec4 m = max(0.5 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
    m = m * m;
    return 105.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
}

// --- FBM with viscosity-controlled octave dampening ---
float fbm(vec3 p, float viscosity) {
    float value = 0.0;
    float amplitude = 0.5;
    float frequency = 1.0;
    for (int i = 0; i < 5; i++) {
        value += amplitude * snoise(p * frequency);
        amplitude *= (0.5 - viscosity * 0.15);
        if (amplitude < 0.01) break;
        frequency *= 2.0;
    }
    return value;
}

// --- Surface normal via central differences ---
vec3 computeNormal(vec2 uv, float time, float viscosity) {
    float eps = 0.006;
    float h  = fbm(vec3(uv, time), viscosity);
    float hx = fbm(vec3(uv + vec2(eps, 0.0), time), viscosity);
    float hy = fbm(vec3(uv + vec2(0.0, eps), time), viscosity);
    return normalize(vec3((h - hx) / eps, (h - hy) / eps, 1.0));
}

// --- Fake environment map for chrome reflections ---
vec3 fakeEnvMap(vec3 rd, vec3 tint) {
    float y = rd.y * 0.5 + 0.5;
    // Base gradient: dark to bright
    vec3 env = mix(vec3(0.03), vec3(0.92), pow(y, 2.2));
    // Studio lighting bands
    float bands = sin(rd.x * 9.0 + rd.y * 5.0) * 0.5 + 0.5;
    bands = smoothstep(0.38, 0.62, bands);
    env = mix(env, vec3(1.0), bands * 0.35);
    // Secondary cross-bands
    float bands2 = sin(rd.x * 4.0 - rd.y * 7.0 + 1.5) * 0.5 + 0.5;
    bands2 = smoothstep(0.42, 0.58, bands2);
    env = mix(env, vec3(0.85), bands2 * 0.15);
    // Dark equatorial region (characteristic of chrome)
    float equator = 1.0 - pow(abs(rd.y), 0.5);
    env *= mix(1.0, 0.25, equator * 0.5);
    // Blend tint: mix between neutral chrome and tinted version
    // This preserves brightness while adding visible color
    vec3 neutral = env;
    vec3 tinted = env * tint;
    float tintStrength = 1.0 - dot(tint, vec3(0.333)); // stronger for saturated tints
    return mix(neutral, tinted, 0.5 + tintStrength * 0.5);
}

// --- Specular highlight ---
float computeSpecular(vec3 n, vec3 v, vec3 l, float power) {
    vec3 h = normalize(l + v);
    return pow(max(dot(n, h), 0.0), power);
}

// --- Color tint interpolation ---
vec3 getTintColor(float t) {
    vec3 silver = vec3(0.92, 0.92, 0.95);
    vec3 gold = vec3(1.0, 0.78, 0.36);
    vec3 copper = vec3(1.0, 0.52, 0.38);
    vec3 blue = vec3(0.35, 0.55, 1.0);
    if (t < 0.333) return mix(silver, gold, t / 0.333);
    if (t < 0.666) return mix(gold, copper, (t - 0.333) / 0.333);
    return mix(copper, blue, (t - 0.666) / 0.334);
}

// --- ACES tone mapping approximation ---
vec3 aces(vec3 x) {
    float a = 2.51;
    float b = 0.03;
    float c = 2.43;
    float d = 0.59;
    float e = 0.14;
    return clamp((x * (a * x + b)) / (x * (c * x + d) + e), 0.0, 1.0);
}

void main() {
    vec2 uv = vUv;
    float aspect = u_resolution.x / u_resolution.y;
    uv.x *= aspect;

    float time = u_time * u_flowSpeed;

    // Domain warping for organic fluid motion
    vec2 warpedUv = uv * 1.8 + vec2(
        snoise(vec3(uv * 1.3, time * 0.25)) * 0.35,
        snoise(vec3(uv * 1.3 + 50.0, time * 0.25)) * 0.35
    );

    vec3 normal = computeNormal(warpedUv, time, u_viscosity);

    vec3 viewDir = vec3(0.0, 0.0, 1.0);
    vec3 reflectDir = reflect(-viewDir, normal);

    vec3 tintColor = getTintColor(u_colorTint);
    vec3 envColor = fakeEnvMap(reflectDir, tintColor);

    // Multi-light specular
    float spec = 0.0;
    spec += computeSpecular(normal, viewDir, normalize(vec3(1.0, 1.0, 0.5)), 256.0);
    spec += computeSpecular(normal, viewDir, normalize(vec3(-0.5, 0.8, 0.3)), 128.0) * 0.6;
    spec += computeSpecular(normal, viewDir, normalize(vec3(0.0, -0.6, 0.8)), 192.0) * 0.3;

    // Fresnel
    float fresnel = pow(1.0 - max(dot(normal, viewDir), 0.0), 3.0);

    // Compose
    vec3 color = envColor * u_reflectionIntensity;
    color += spec * tintColor * u_reflectionIntensity * 1.2;
    color = mix(color, envColor * 1.6, fresnel * 0.4);

    // Vignette
    vec2 vc = vUv - 0.5;
    vc.x *= aspect;
    float vignette = 1.0 - length(vc) * 0.9;
    vignette = smoothstep(0.0, 0.7, vignette);
    color *= vignette;

    // Tone map + gamma
    color = aces(color);
    color = pow(color, vec3(1.0 / 2.2));

    // Dither to reduce banding
    color += (fract(sin(dot(gl_FragCoord.xy, vec2(12.9898, 78.233))) * 43758.5453) - 0.5) / 255.0;

    fragColor = vec4(color, 1.0);
}
</script>

<script>
(function() {
  const canvas = document.getElementById('canvas');
  const gl = canvas.getContext('webgl2');

  if (!gl) {
    document.getElementById('fallback').style.display = 'flex';
    document.getElementById('panel').style.display = 'none';
    return;
  }

  // --- Shader compilation ---
  function compileShader(id, type) {
    const src = document.getElementById(id).textContent;
    const shader = gl.createShader(type);
    gl.shaderSource(shader, src);
    gl.compileShader(shader);
    if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
      console.error(id + ':', gl.getShaderInfoLog(shader));
      return null;
    }
    return shader;
  }

  const vs = compileShader('vertexShader', gl.VERTEX_SHADER);
  const fs = compileShader('fragmentShader', gl.FRAGMENT_SHADER);
  const program = gl.createProgram();
  gl.attachShader(program, vs);
  gl.attachShader(program, fs);
  gl.linkProgram(program);
  if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
    console.error('Link:', gl.getProgramInfoLog(program));
    return;
  }
  gl.useProgram(program);

  // Dummy VAO for WebGL 2 compliance
  const vao = gl.createVertexArray();
  gl.bindVertexArray(vao);

  // --- Uniforms ---
  const uniforms = {
    u_time: gl.getUniformLocation(program, 'u_time'),
    u_resolution: gl.getUniformLocation(program, 'u_resolution'),
    u_viscosity: gl.getUniformLocation(program, 'u_viscosity'),
    u_reflectionIntensity: gl.getUniformLocation(program, 'u_reflectionIntensity'),
    u_flowSpeed: gl.getUniformLocation(program, 'u_flowSpeed'),
    u_colorTint: gl.getUniformLocation(program, 'u_colorTint'),
  };

  // --- Parameters ---
  const params = {
    viscosity: 0.5,
    reflectionIntensity: 1.0,
    flowSpeed: 0.8,
    colorTint: 0.0,
  };

  // --- Resize ---
  const dpr = Math.min(window.devicePixelRatio || 1, 1.5);
  function resize() {
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    gl.viewport(0, 0, canvas.width, canvas.height);
  }
  window.addEventListener('resize', resize);
  resize();

  // --- Animation loop ---
  const startTime = performance.now();
  function render() {
    const elapsed = (performance.now() - startTime) / 1000.0;
    gl.uniform1f(uniforms.u_time, elapsed);
    gl.uniform2f(uniforms.u_resolution, canvas.width, canvas.height);
    gl.uniform1f(uniforms.u_viscosity, params.viscosity);
    gl.uniform1f(uniforms.u_reflectionIntensity, params.reflectionIntensity);
    gl.uniform1f(uniforms.u_flowSpeed, params.flowSpeed);
    gl.uniform1f(uniforms.u_colorTint, params.colorTint);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(render);
  }
  requestAnimationFrame(render);

  // --- Tint label ---
  function tintLabel(t) {
    if (t < 0.17) return 'Silver';
    if (t < 0.50) return 'Gold';
    if (t < 0.83) return 'Copper';
    return 'Blue';
  }

  // --- Slider <-> param mapping ---
  const sliders = {
    viscosity:   { el: document.getElementById('viscosity'),   display: document.getElementById('viscosity-val'),   toParam: v => v / 100,           toSlider: p => p * 100,     fmt: p => p.toFixed(2) },
    reflection:  { el: document.getElementById('reflection'),  display: document.getElementById('reflection-val'),  toParam: v => v / 100 * 2.0,     toSlider: p => p / 2.0 * 100, fmt: p => p.toFixed(2) },
    speed:       { el: document.getElementById('speed'),       display: document.getElementById('speed-val'),       toParam: v => v / 100 * 3.0,     toSlider: p => p / 3.0 * 100, fmt: p => p.toFixed(2) },
    tint:        { el: document.getElementById('tint'),        display: document.getElementById('tint-val'),        toParam: v => v / 100,           toSlider: p => p * 100,     fmt: p => tintLabel(p) },
  };

  const paramKeys = { viscosity: 'viscosity', reflection: 'reflectionIntensity', speed: 'flowSpeed', tint: 'colorTint' };

  Object.keys(sliders).forEach(key => {
    sliders[key].el.addEventListener('input', e => {
      const val = sliders[key].toParam(parseFloat(e.target.value));
      params[paramKeys[key]] = val;
      sliders[key].display.textContent = sliders[key].fmt(val);
    });
  });

  function updateSlidersFromParams() {
    Object.keys(sliders).forEach(key => {
      const pKey = paramKeys[key];
      sliders[key].el.value = sliders[key].toSlider(params[pKey]);
      sliders[key].display.textContent = sliders[key].fmt(params[pKey]);
    });
  }

  // --- Presets ---
  const presets = {
    mercury: { viscosity: 0.5,  reflectionIntensity: 1.0,  flowSpeed: 0.8,  colorTint: 0.0  },
    gold:    { viscosity: 0.7,  reflectionIntensity: 1.4,  flowSpeed: 0.5,  colorTint: 0.33 },
    steel:   { viscosity: 0.25, reflectionIntensity: 0.6,  flowSpeed: 0.35, colorTint: 0.0  },
    neon:    { viscosity: 0.4,  reflectionIntensity: 1.8,  flowSpeed: 1.2,  colorTint: 1.0  },
  };

  const presetButtons = document.querySelectorAll('.preset');
  let animFrame = null;

  function applyPreset(name) {
    const target = presets[name];
    const start = { ...params };
    const t0 = performance.now();
    const duration = 600;

    presetButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.preset === name));

    if (animFrame) cancelAnimationFrame(animFrame);

    function animate() {
      const t = Math.min((performance.now() - t0) / duration, 1);
      const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t; // ease-in-out quad
      for (const key of Object.keys(target)) {
        params[key] = start[key] + (target[key] - start[key]) * ease;
      }
      updateSlidersFromParams();
      if (t < 1) animFrame = requestAnimationFrame(animate);
      else animFrame = null;
    }
    animate();
  }

  presetButtons.forEach(btn => {
    btn.addEventListener('click', () => applyPreset(btn.dataset.preset));
  });
})();
</script>
</body>
</html>
